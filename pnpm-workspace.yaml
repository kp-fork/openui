packages:
  - "packages/*"
  - "examples/**/*"
  - "docs/"
  - "!**/src/templates/**"

# Centralized dependency versions shared across packages.
# Reference these from a package.json with the "catalog:" protocol.
catalog:
  "@types/react": ">=19.0.0"
  jsdom: "^26.1.0"
  react: "^18.3.1 || ^19.0.0"
  react-dom: "^18.0.0 || ^19.0.0"
  zod: "^3.25.0 || ^4.0.0"
  zustand: "^4.5.5"
